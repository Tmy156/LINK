<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Kết Nội Bộ - Xã Núi Cấm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fef0db;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .emblem-main {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #8c0000;
        }
        .sub {
            font-size: 14px;
            font-style: italic;
            color: #666;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }
        .link-item:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }
        .emblem {
            width: 30px;
            height: 30px;
            margin-right: 15px;
        }
        .zalo-icon {
            width: 30px;
            height: 30px;
            margin-right: 15px;
        }
        .sub-link-container {
            display: none; /* Ẩn mặc định */
            width: 100%;
            padding-left: 20px;
            box-sizing: border-box;
        }
        .sub-link-item {
            background-color: #fff;
            border: 1px dashed #ccc;
            margin-top: 5px;
        }
        footer {
            margin-top: 40px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SVG Quốc Huy chính -->
        <svg class="emblem-main" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="#c8272a"/>
            <polygon points="50,20 58,44 84,44 62,58 70,82 50,68 30,82 38,58 16,44 42,44" fill="#f4c430"/>
        </svg>

        <h1>Hệ thống giải quyết TTHC cấp Bộ ngành</h1>
        <p class="sub">*Trang nội bộ xã Núi Cấm*</p>

        <div class="links" id="linkList">
            <!-- Link cha của Bộ Y Tế, khi bấm sẽ xổ ra link con -->
            <div class="link-item parent-link" id="btnBoYTe" style="cursor: pointer;">
                <svg class="emblem" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#c8272a"/><polygon points="50,20 58,44 84,44 62,58 70,82 50,68 30,82 38,58 16,44 42,44" fill="#f4c430"/></svg>
                <span>BỘ Y TẾ ▾</span>
            </div>
            
            <!-- Khung chứa 3 link con của Bộ Y Tế -->
            <div class="sub-link-container" id="subContainerBoYTe">
                <a href="https://motcua.moh.gov.vn/" target="_blank" class="link-item sub-link-item">
                    <span>Hệ thống Một Cửa</span>
                </a>
                <a href="https://dvc.moh.gov.vn/" target="_blank" class="link-item sub-link-item">
                    <span>Cổng Dịch Vụ Công</span>
                </a>
                <a href="https://csdl.moh.gov.vn/" target="_blank" class="link-item sub-link-item">
                    <span>Cơ Sở Dữ Liệu</span>
                </a>
            </div>

            <!-- Các nút đơn bình thường khác -->
            <a href="https://motcua.moj.gov.vn/" target="_blank" class="link-item">
                <svg class="emblem" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#c8272a"/><polygon points="50,20 58,44 84,44 62,58 70,82 50,68 30,82 38,58 16,44 42,44" fill="#f4c430"/></svg>
                <span>BỘ TƯ PHÁP</span>
            </a>
            <a href="https://bcth.thanhtra.gov.vn/" target="_blank" class="link-item">
                <svg class="emblem" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#c8272a"/><polygon points="50,20 58,44 84,44 62,58 70,82 50,68 30,82 38,58 16,44 42,44" fill="#f4c430"/></svg>
                <span>THANH TRA CHÍNH PHỦ</span>
            </a>
            <a href="#" target="_blank" class="link-item">
                <svg class="emblem" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#c8272a"/><polygon points="50,20 58,44 84,44 62,58 70,82 50,68 30,82 38,58 16,44 42,44" fill="#f4c430"/></svg>
                <span>BỘ CÔNG THƯƠNG</span>
            </a>
            <a href="#" target="_blank" class="link-item">
                <svg class="emblem" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#c8272a"/><polygon points="50,20 58,44 84,44 62,58 70,82 50,68 30,82 38,58 16,44 42,44" fill="#f4c430"/></svg>
                <span>BỘ GIÁO DỤC VÀ ĐÀO TẠO</span>
            </a>
            <a href="#" target="_blank" class="link-item">
                <svg class="zalo-icon" viewBox="0 0 24 24" fill="#0068ff"><path d="M12 2C6.48 2 2 5.58 2 10c0 2.49 1.4 4.7 3.66 6.07-.15.56-.54 1.95-.62 2.27-.13.48.16.45.34.33.15-.1.2.4-.44 1.34-1.46 1.15-2.6 1.4-2.82.04-.08-.43-.53-1.84-.71-2.45C3.33 16.32 2 13.3 2 10c0-4.42 4.48-8 10-8s10 3.58 10 8-4.48 8-10 8c-.6 0-1.18-.04-1.74-.13-.78.68-1.92 1.4-3.15 1.7-.22.05-.4-.12-.3-.32.32-.62.83-1.57.94-2.18C3.76 17.5 2.5 15 2.5 12c0-5.52 4.25-10 9.5-10z"/></svg>
                <span>Group Zalo BỘ Y TẾ An Giang</span>
            </a>
        </div>

        <footer>© 2026 – Trang liên kết nội bộ</footer>
    </div>

    <!-- Đoạn JavaScript xử lý logic ẩn hiện menu -->
    <script>
        document.getElementById('btnBoYTe').addEventListener('click', function() {
            var container = document.getElementById('subContainerBoYTe');
            if (container.style.display === 'block') {
                container.style.display = 'none'; // Đang hiện thì ẩn đi
            } else {
                container.style.display = 'block'; // Đang ẩn thì hiện lên
            }
        });
    </script>
</body>
</html>
</body>
</html>
